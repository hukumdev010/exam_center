version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
      # Named volumes for better performance and permission handling
      - frontend_node_modules:/workspaces/exam_center/frontend/node_modules
      - frontend_yarn_cache:/workspaces/exam_center/frontend/.yarn
    command: sleep infinity
    network_mode: service:db
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/exam_center
      # File watching environment variables
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: exam_center
    ports:
      - "5432:5432"

volumes:
  postgres-data:
  frontend_node_modules:
  frontend_yarn_cache:
